<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keystone — Sign in</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #0e0e0e;
        --ink: #e6e6e6;
        --muted: #8d8d8d;
        --line: #262626;
        --line-strong: #3f3f3f;
        --danger: #e05c5c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 360px;
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 28px 24px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      p.sub {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 12px;
      }
      label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .user-picker {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
      }
      .user-btn {
        flex: 1;
        padding: 10px 0;
        background: #000;
        border: 1px solid var(--line-strong);
        color: var(--muted);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 0.12s, color 0.12s;
      }
      .user-btn:hover { border-color: var(--ink); color: var(--ink); }
      .user-btn.active {
        border-color: var(--ink);
        background: var(--ink);
        color: #0a0a0a;
      }
      input {
        width: 100%;
        background: #000;
        border: 1px solid var(--line-strong);
        color: var(--ink);
        font: inherit;
        padding: 10px 12px;
      }
      input:focus { outline: none; border-color: var(--ink); }
      button[type="submit"] {
        width: 100%;
        margin-top: 16px;
        background: var(--ink);
        color: #0a0a0a;
        border: none;
        font: inherit;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 11px;
        cursor: pointer;
      }
      button[type="submit"]:disabled { opacity: 0.6; cursor: default; }
      .error {
        margin-top: 14px;
        color: var(--danger);
        font-size: 12px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <form class="card" id="loginForm">
      <h1>Keystone</h1>
      <p class="sub">Who are you?</p>
      <label>User</label>
      <div class="user-picker" id="userPicker">
        <button type="button" class="user-btn" data-user="Tommy">Tommy</button>
        <button type="button" class="user-btn" data-user="Brandon">Brandon</button>
        <button type="button" class="user-btn" data-user="Mac">Mac</button>
      </div>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit" id="submit">Sign in</button>
      <div class="error" id="error" role="alert"></div>
    </form>
    <script>
      let selectedUser = "";
      const picker = document.getElementById("userPicker");
      const errorEl = document.getElementById("error");
      const submitEl = document.getElementById("submit");
      const passwordEl = document.getElementById("password");

      picker.addEventListener("click", (e) => {
        const btn = e.target.closest(".user-btn");
        if (!btn) return;
        selectedUser = btn.dataset.user;
        picker.querySelectorAll(".user-btn").forEach((b) => b.classList.toggle("active", b === btn));
        passwordEl.focus();
      });

      document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        if (!selectedUser) { errorEl.textContent = "Pick a user first."; return; }
        submitEl.disabled = true;
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: selectedUser, password: passwordEl.value })
          });
          if (res.ok) { window.location.replace("/"); return; }
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || "Incorrect password.";
        } catch {
          errorEl.textContent = "Could not sign in. Try again.";
        } finally {
          submitEl.disabled = false;
        }
      });
    </script>
  </body>
</html>
