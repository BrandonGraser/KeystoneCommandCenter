<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keystone — Storyboard</title>
    <script>
      // Server-sync shim: loads workspace from the API before React mounts,
      // intercepts localStorage writes to push to the server, and polls for
      // remote changes so multiple users stay in sync.
      (function() {
        var WS_KEY = "drezzdon-arg-storyboard-clean-workspace-v1";
        var POLL_MS = 3000;
        var serverVersion = 0;
        var saving = false;
        var pendingSave = null;

        var origSetItem = localStorage.setItem.bind(localStorage);
        var origGetItem = localStorage.getItem.bind(localStorage);

        localStorage.setItem = function(key, value) {
          origSetItem(key, value);
          if (key === WS_KEY) pushToServer(value);
        };

        function pushToServer(data) {
          if (saving) { pendingSave = data; return; }
          saving = true;
          fetch("/api/storyboard", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: data, version: serverVersion })
          })
          .then(function(r) { return r.json(); })
          .then(function(result) {
            if (result.version) serverVersion = result.version;
            if (result.conflict) pullFromServer();
            saving = false;
            if (pendingSave) { var d = pendingSave; pendingSave = null; pushToServer(d); }
          })
          .catch(function() { saving = false; });
        }

        function pullFromServer() {
          return fetch("/api/storyboard")
            .then(function(r) { return r.json(); })
            .then(function(result) {
              if (result.version > serverVersion) {
                serverVersion = result.version;
                var serverData = typeof result.data === "string" ? result.data : JSON.stringify(result.data);
                var localData = origGetItem(WS_KEY);
                if (serverData && serverData !== "{}" && serverData !== localData) {
                  origSetItem(WS_KEY, serverData);
                  window.location.reload();
                }
              }
            })
            .catch(function() {});
        }

        function pollVersion() {
          if (document.hidden) return;
          fetch("/api/storyboard/version")
            .then(function(r) { return r.json(); })
            .then(function(result) {
              if (result.version > serverVersion) pullFromServer();
            })
            .catch(function() {});
        }

        // Initial load: fetch workspace from server, populate localStorage,
        // then dynamically load the React app so it reads the server state.
        fetch("/api/storyboard")
          .then(function(r) { return r.json(); })
          .then(function(result) {
            serverVersion = result.version || 0;
            var serverData = typeof result.data === "string" ? result.data : JSON.stringify(result.data);
            if (serverData && serverData !== "{}") {
              origSetItem(WS_KEY, serverData);
            } else {
              var local = origGetItem(WS_KEY);
              if (local) pushToServer(local);
            }
          })
          .catch(function() {})
          .finally(function() {
            var s = document.createElement("script");
            s.type = "module";
            s.crossOrigin = "anonymous";
            s.src = "./assets/index-DyFWcC9a.js";
            document.head.appendChild(s);
          });

        setInterval(pollVersion, POLL_MS);
        document.addEventListener("visibilitychange", function() {
          if (!document.hidden) pollVersion();
        });
      })();
    </script>
    <link rel="stylesheet" crossorigin href="./assets/index-RNNVIk9U.css">
    <style>
      /* --- Keystone theme overrides --- */
      :root {
        --red: #e6e6e6;
        --red-dim: #262626;
        --blue: #6aa0ff;
        --panel: #0e0e0e;
        --panel-soft: #131313;
        --line: #262626;
        --muted: #8d8d8d;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, "Liberation Mono", Menlo, monospace;
      }

      body, #root { background: #0a0a0a; }

      .app-shell {
        background: #0a0a0a;
      }

      /* Top strip */
      .top-strip {
        background:
          linear-gradient(180deg, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.52) 58%, transparent 100%),
          radial-gradient(ellipse at 50% 18%, rgba(10,10,10,0.82), transparent 62%);
      }

      /* Map tabs — monochrome with subtle accent */
      .map-tab {
        border: 1px solid #262626;
        background: #0e0e0e;
        color: #8d8d8d;
      }
      .map-tab.is-active {
        border-color: #e6e6e6;
        color: #e6e6e6;
        box-shadow: inset 0 -2px 0 #e6e6e6;
      }
      .map-tab.is-drag-over {
        border-color: #6aa0ff;
      }

      .map-panel input {
        color: #8d8d8d;
        font-family: inherit;
      }
      .map-panel input:focus {
        color: #e6e6e6;
      }

      .map-panel__delete {
        border: 1px solid #3f3f3f;
        background: #0e0e0e;
      }
      .map-panel__delete:hover:not(:disabled) {
        border-color: #e05c5c;
        color: #e05c5c;
      }

      /* ReactFlow canvas */
      .react-flow {
        background:
          linear-gradient(rgba(230,230,230,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(230,230,230,0.03) 1px, transparent 1px),
          #0a0a0a !important;
        background-size: 64px 64px;
      }

      .react-flow__background {
        opacity: 0.3;
      }

      /* Edge text */
      .react-flow__edge-text {
        fill: #e6e6e6;
      }
      .react-flow__edge-textbg {
        fill: #0a0a0a;
        stroke: #3f3f3f;
      }

      /* Minimap */
      .react-flow__minimap {
        border: 1px solid #262626 !important;
        background: rgba(14,14,14,0.6) !important;
      }

      /* Story cards — keep accent colors but darken the chrome */
      .story-card {
        background:
          linear-gradient(90deg, rgba(255,255,255,0.03), transparent 42%),
          #0e0e0e;
        font-family: inherit;
      }

      .story-card__signal {
        background:
          linear-gradient(transparent 0 45%, rgba(255,255,255,0.04) 46% 49%, transparent 50%),
          radial-gradient(circle at 92% 10%, color-mix(in srgb, var(--accent), transparent 72%), transparent 28%);
      }

      .story-card__kind {
        font-family: inherit;
      }

      .story-card h2 {
        font-family: inherit;
        font-weight: 800;
      }

      /* Context menu & edge editor — neutral */
      .context-node-menu,
      .node-mini-menu,
      .edge-editor {
        border: 1px solid #3f3f3f;
        background: rgba(14,14,14,0.96);
      }

      .context-node-menu button {
        border: 1px solid #262626;
        background: #0e0e0e;
      }
      .context-node-menu button:hover,
      .node-mini-menu button:hover {
        background: rgba(230,230,230,0.08);
        color: #e6e6e6;
      }

      .node-mini-menu button {
        border: 1px solid #3f3f3f;
        background: #0e0e0e;
      }

      .edge-editor label {
        color: #8d8d8d;
      }
      .edge-editor input,
      .edge-editor select {
        border: 1px solid #262626;
        background: #0a0a0a;
        color: #e6e6e6;
      }

      /* Focus panel (node editor overlay) */
      .focus-backdrop {
        background: rgba(10,10,10,0.7);
      }
      .focus-panel {
        border: 1px solid #3f3f3f;
        background:
          linear-gradient(90deg, rgba(14,14,14,0.98), rgba(14,14,14,0.92)),
          radial-gradient(circle at 92% 12%, color-mix(in srgb, var(--accent), transparent 82%), transparent 30%);
      }
      .focus-panel__header {
        font-family: inherit;
      }
      .focus-panel__header button {
        border: 1px solid #262626;
        background: #0e0e0e;
      }
      .focus-panel label {
        color: #8d8d8d;
      }
      .focus-panel input,
      .focus-panel select,
      .focus-panel textarea,
      .attribute-note-box textarea {
        border: 1px solid #262626;
        background: #0a0a0a;
        color: #e6e6e6;
        font-family: inherit;
      }

      /* Danger button */
      .danger-button {
        border: 1px solid #e05c5c;
        background: #1a0808;
        font-family: inherit;
      }
      .danger-button:hover {
        background: #e05c5c;
        color: #0a0a0a;
      }

      /* Map delete confirm dialog */
      .map-delete-confirm {
        background: rgba(10,10,10,0.8);
      }
      .map-delete-confirm__panel {
        border: 1px solid #3f3f3f;
        background: #0e0e0e;
      }
      .map-delete-confirm__panel strong {
        color: #e05c5c;
      }
      .map-delete-confirm__panel input {
        border: 1px solid #262626;
        background: #0a0a0a;
        color: #e6e6e6;
      }
      .map-delete-confirm__actions button {
        border: 1px solid #262626;
        background: #131313;
      }
      .map-delete-confirm__yes:not(:disabled) {
        border-color: #e05c5c;
        background: #1a0808;
      }

      /* Group selection frame */
      .group-selection-frame__handle {
        background: #e6e6e6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
