<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keystone Task Command Center</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <nav class="main-tabs" id="mainTabs">
        <button type="button" class="main-tab active" data-tab="tasks">Tasks</button>
        <button type="button" class="main-tab" data-tab="accounts">Accounts</button>
        <button type="button" class="main-tab" data-tab="notes">Notes</button>
      </nav>

      <div id="tasksView">
      <section class="metrics" id="metrics"></section>

      <section class="resources-row">
        <div class="resource-block collapsed" data-resource-block="logins">
          <button type="button" class="resource-heading" aria-expanded="false">
            <span class="collapse-indicator" aria-hidden="true"></span>
            <h3>LOGINS</h3>
            <span class="add-resource" data-resource-section="logins" title="Add login reference" role="button">+</span>
          </button>
          <div id="loginResources" class="resource-list"></div>
        </div>
        <div class="resource-block collapsed" data-resource-block="important_links">
          <button type="button" class="resource-heading" aria-expanded="false">
            <span class="collapse-indicator" aria-hidden="true"></span>
            <h3>IMPORTANT LINKS</h3>
            <span class="add-resource" data-resource-section="important_links" title="Add important link" role="button">+</span>
          </button>
          <div id="importantLinkResources" class="resource-list"></div>
        </div>
      </section>

      <section class="controls">
        <div>
          <span class="control-label">Assignee</span>
          <div id="assigneeTabs" class="segmented"></div>
        </div>
        <label>
          <span class="control-label">Status</span>
          <select id="statusFilter"></select>
        </label>
        <label>
          <span class="control-label">Due</span>
          <select id="dueFilter">
            <option value="">Any due date</option>
            <option value="overdue">Overdue</option>
            <option value="today">Today</option>
            <option value="week">This week</option>
            <option value="none">No due date</option>
          </select>
        </label>
        <div class="search-actions">
          <label class="search">
            <span class="control-label">Search</span>
            <input id="searchInput" type="search" placeholder="Task, note, link">
          </label>
          <button id="archiveToggle" class="secondary archive-toggle" type="button">Archive</button>
        </div>
      </section>

      <div id="notice" class="notice" hidden></div>

      <section class="workspace">
        <div class="task-board" id="taskBoard"></div>
      </section>
      </div>

      <div id="accountsView" hidden>
        <section class="account-overall" id="accountOverall"></section>
        <section class="metrics account-metrics" id="accountMetrics"></section>
        <section class="controls accounts-controls">
          <div>
            <span class="control-label">TikTok Accounts</span>
            <p class="accounts-subhead">TikTok account management</p>
          </div>
          <label class="search account-search">
            <span class="control-label">Search</span>
            <input id="accountSearch" type="search" placeholder="Account name">
          </label>
          <label>
            <span class="control-label">Sort</span>
            <select id="accountSort">
              <option value="runout">Runs out soonest</option>
              <option value="name-asc">Name A–Z</option>
              <option value="name-desc">Name Z–A</option>
            </select>
          </label>
          <div class="accounts-actions">
            <button type="button" id="syncAllAccounts" class="secondary">Sync All</button>
            <button type="button" id="addAccount" class="primary">Add account</button>
          </div>
        </section>
        <div class="account-board" id="accountBoard"></div>
      </div>

      <div id="notesView" hidden>
        <iframe id="storyboardFrame" class="storyboard-frame" loading="lazy"></iframe>
      </div>
      <aside class="chat-sidebar collapsed" id="chatSidebar">
        <button type="button" class="chat-sidebar-toggle" id="chatSidebarToggle" title="Toggle chat">
          <span class="chat-sidebar-toggle-icon">💬</span>
          <span class="chat-badge" id="chatBadge"></span>
        </button>
        <div class="chat-sidebar-inner">
          <div class="chat-sidebar-header">
            <h3>Chat</h3>
            <button type="button" class="chat-sidebar-close" id="chatSidebarClose" title="Close chat">&times;</button>
          </div>
          <div class="chat-sidebar-channels" id="chatChannels"></div>
          <div class="chat-sidebar-messages" id="chatSidebarMessages"></div>
          <form class="chat-sidebar-composer" id="chatSidebarForm">
            <textarea id="chatSidebarInput" rows="2" placeholder="Message — Enter to send"></textarea>
            <button type="submit" class="primary">Send</button>
          </form>
        </div>
        <div class="chat-sidebar-resize" id="chatSidebarResize"></div>
      </aside>
    </main>

    <dialog id="taskDialog">
      <form id="taskForm" method="dialog" class="task-form">
        <div class="dialog-head">
          <div>
            <h2 id="dialogTitle">What do you want me to do?</h2>
            <p class="eyebrow" id="dialogMode">New task</p>
          </div>
          <button type="button" id="closeDialog" class="icon-button" title="Close">x</button>
        </div>

        <input type="hidden" id="taskId">

        <div class="who-for-section">
          <span class="control-label">Who is this for?</span>
          <div id="categoryPillPicker" class="category-pill-picker"></div>
          <select id="taskCategory" class="category-select-hidden" aria-label="Category" tabindex="-1"></select>
        </div>

        <label>
          <span>Task Name</span>
          <input id="taskName" type="text" required>
        </label>
        <label>
          <span>Task Details</span>
          <textarea id="taskTitle" rows="3" placeholder="What needs to happen?"></textarea>
        </label>
        <div class="form-grid form-grid-2">
          <label>
            <span>Assignee</span>
            <select id="taskAssignee"></select>
          </label>
          <label>
            <span>Due</span>
            <input id="taskDue" type="date">
          </label>
        </div>
        <label class="check-row">
          <input id="taskDone" type="checkbox">
          <span>Done</span>
        </label>
        <div class="workflow-section">
          <div class="section-line">
            <span>Workflow</span>
            <button type="button" id="addWorkflowStep" class="secondary">Add step</button>
          </div>
          <div id="taskWorkflow" class="workflow-grid"></div>
        </div>
        <div class="links-section">
          <div class="section-line">
            <span>Links</span>
            <button type="button" id="addTaskLink" class="secondary add-link-button">Add link</button>
          </div>
          <div id="taskLinks" class="link-grid"></div>
        </div>
        <label>
          <span>Notes</span>
          <textarea id="taskNotes" rows="4" placeholder="Tommy: note text"></textarea>
        </label>
        <div class="note-links-section">
          <div class="section-line">
            <span>Note Links</span>
            <button type="button" id="addNoteLink" class="secondary add-link-button">Add person link</button>
          </div>
          <div id="taskNoteLinks" class="note-link-grid"></div>
        </div>
        <div class="form-images-section">
          <span class="control-label">Images</span>
          <div id="taskImages" class="task-image-grid"></div>
        </div>
        <div class="dialog-actions">
          <button type="button" id="archiveTask" class="danger">Archive</button>
          <span></span>
          <button type="button" id="cancelTask">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="resourceDialog">
      <form id="resourceForm" method="dialog" class="resource-form">
        <div class="dialog-head">
          <div>
            <h2 id="resourceDialogTitle">Add resource</h2>
            <p class="eyebrow">Directory item</p>
          </div>
          <button type="button" id="closeResourceDialog" class="icon-button" title="Close">x</button>
        </div>
        <input id="resourceSection" type="hidden" value="important_links">
        <label>
          <span>Name</span>
          <input id="resourceTitle" type="text" required>
        </label>
        <label>
          <span>Link</span>
          <input id="resourceUrl" type="url" placeholder="https://...">
        </label>
        <div id="resourceLoginFields" class="resource-login-fields" hidden>
          <label>
            <span>Username</span>
            <input id="resourceUsername" type="text" autocomplete="off">
          </label>
          <label>
            <span>Password</span>
            <input id="resourcePassword" type="text" autocomplete="off">
          </label>
        </div>
        <div class="dialog-actions">
          <span></span>
          <button type="button" id="cancelResource">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="ringDialog">
      <form id="ringForm" method="dialog" class="ring-form">
        <div class="dialog-head">
          <div>
            <h2>Ring Tommy</h2>
            <p class="eyebrow">Send a note or problem</p>
          </div>
          <button type="button" id="closeRingDialog" class="icon-button" title="Close">x</button>
        </div>
        <label class="ring-description-field">
          <span>Description</span>
          <textarea id="ringDescription" rows="5" placeholder="What needs attention?"></textarea>
        </label>
        <label class="ring-task-field">
          <span>Attach to task</span>
          <select id="ringTask">
            <option value="">No task attached</option>
          </select>
        </label>
        <fieldset class="ring-priority">
          <legend>Setting</legend>
          <label>
            <input type="radio" name="ringUrgency" value="urgent">
            <span>Urgent</span>
          </label>
          <label>
            <input type="radio" name="ringUrgency" value="today" checked>
            <span>Today</span>
          </label>
          <label>
            <input type="radio" name="ringUrgency" value="whenever">
            <span>Whenever</span>
          </label>
        </fieldset>
        <div class="dialog-actions">
          <span></span>
          <button type="button" id="cancelRing">Cancel</button>
          <button type="submit" class="primary">Send Ring</button>
        </div>
      </form>
    </dialog>

    <dialog id="accountDialog">
      <form id="accountForm" method="dialog" class="task-form">
        <div class="dialog-head">
          <div>
            <h2 id="accountDialogTitle">Add account</h2>
            <p class="eyebrow" id="accountDialogMode">New TikTok account</p>
          </div>
          <button type="button" id="closeAccountDialog" class="icon-button" title="Close">x</button>
        </div>

        <input type="hidden" id="accountId">

        <label>
          <span>Account Name</span>
          <input id="accountName" type="text" autocomplete="off">
        </label>
        <div class="account-avatar-field">
          <span>Profile Picture</span>
          <div class="account-avatar-edit">
            <div id="accountAvatarPreview" class="account-avatar-preview"></div>
            <label class="secondary account-avatar-choose">Choose image
              <input id="accountAvatarInput" type="file" accept="image/*" hidden>
            </label>
            <button type="button" id="accountAvatarRemove" class="secondary">Remove</button>
          </div>
        </div>
        <div class="form-grid form-grid-2">
          <label>
            <span>AE Project Link</span>
            <input id="accountAeUrl" type="url" placeholder="https://...">
          </label>
          <label>
            <span>Tutorial Link</span>
            <input id="accountTutorialUrl" type="url" placeholder="https://...">
          </label>
        </div>
        <label>
          <span>Upload Link</span>
          <input id="accountUploadUrl" type="url" placeholder="https://… — adds an UPLOAD button to the account">
        </label>
        <div class="form-grid form-grid-2">
          <label>
            <span>Username</span>
            <input id="accountUsername" type="text" autocomplete="off">
          </label>
          <label>
            <span>Email</span>
            <input id="accountEmail" type="text" autocomplete="off">
          </label>
        </div>
        <div class="form-grid form-grid-2">
          <label>
            <span>Password</span>
            <input id="accountPassword" type="text" autocomplete="off">
          </label>
          <label>
            <span>Scheduled through</span>
            <input id="accountScheduledThrough" type="date">
          </label>
        </div>
        <label>
          <span>Group</span>
          <input id="accountGroup" type="text" list="accountGroupList" autocomplete="off" placeholder="Pick a group or type a new one">
          <datalist id="accountGroupList"></datalist>
        </label>
        <div class="workflow-section">
          <div class="section-line">
            <span>Process Steps</span>
            <button type="button" id="addAccountStep" class="secondary">Add step</button>
          </div>
          <div id="accountSteps" class="account-step-grid"></div>
        </div>
        <div class="dialog-actions">
          <button type="button" id="deleteAccount" class="danger">Delete</button>
          <span></span>
          <button type="button" id="cancelAccount">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
